<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具 v1.1 - 管理后台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ 图片压缩工具 <span class="version">v1.1</span></h1>
            <p class="subtitle">Web 管理后台</p>
        </header>

        <main>
            <!-- 配置区域 -->
            <section class="config-section">
                <h2>⚙️ 压缩配置</h2>
                <div class="form-group">
                    <label for="inputDir">输入目录：</label>
                    <div class="input-with-select">
                        <input type="text" id="inputDir" value="{{ default_input }}" placeholder="/photos">
                        <button type="button" id="browseInputBtn" class="btn-browse" title="浏览目录">📁</button>
                    </div>
                    <!-- 目录选择器弹窗 -->
                    <div id="directoryModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>选择输入目录</h3>
                                <button class="modal-close">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="path-nav" id="pathNav">
                                    <span class="path-current">/photos</span>
                                </div>
                                <div class="directory-list" id="directoryList">
                                    <div class="dir-item dir-up" data-path="..">
                                        <span class="dir-icon">📁</span>
                                        <span class="dir-name">.. 返回上级</span>
                                    </div>
                                    <!-- 动态生成子目录 -->
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary modal-cancel">取消</button>
                                <button class="btn btn-primary modal-confirm">确定</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="outputDir">输出目录：</label>
                    <div class="input-with-select">
                        <input type="text" id="outputDir" value="{{ default_output }}" placeholder="/output">
                        <button type="button" id="browseOutputBtn" class="btn-browse" title="浏览目录">📁</button>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="jobs">线程数：</label>
                        <input type="number" id="jobs" value="4" min="1" max="16">
                    </div>
                    <div class="form-group">
                        <label for="prefix">前缀：</label>
                        <input type="text" id="prefix" value="DSC" placeholder="DSC">
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="noSkip">
                            不跳过已压缩文件
                        </label>
                    </div>
                </div>
            </section>

            <!-- 控制按钮 -->
            <section class="control-section">
                <button id="startBtn" class="btn btn-primary">▶️ 开始压缩</button>
                <button id="stopBtn" class="btn btn-danger" disabled>⏹️ 停止</button>
            </section>

            <!-- 进度显示 -->
            <section class="progress-section">
                <h2>📊 压缩进度</h2>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0% (0/0)</div>
                </div>
                <div class="stats">
                    <span class="stat-item">✅ 成功：<strong id="successCount">0</strong></span>
                    <span class="stat-item">❌ 失败：<strong id="failedCount">0</strong></span>
                    <span class="stat-item">📁 总计：<strong id="totalCount">0</strong></span>
                </div>
                <div class="status-badge" id="statusBadge">
                    <span class="dot"></span> 空闲
                </div>
            </section>

            <!-- 日志区域 -->
            <section class="log-section">
                <h2>📝 日志输出</h2>
                <div class="log-container" id="logContainer">
                    <div class="log-empty">等待开始压缩...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>图片压缩工具 v1.1 | Powered by Flask + ImageMagick</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
