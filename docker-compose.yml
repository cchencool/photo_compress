services:
  photo-compressor:
    build: .
    container_name: photo-compressor
    ports:
      # Web 管理后台端口
      - "5555:5555"
    volumes:
      # 挂载照片目录
      - /home/chen/Pictures:/photos:ro
      # 挂载输出目录
      - ./output:/output
      # 挂载日志目录
      - ./logs:/logs
    environment:
      # 默认输入/输出路径（可在 Web 界面修改）
      - DEFAULT_INPUT_DIR=/photos
      - DEFAULT_OUTPUT_DIR=/output
      # 可选：设置日志级别
      - LOG_LEVEL=INFO
    # 重启策略
    restart: unless-stopped
